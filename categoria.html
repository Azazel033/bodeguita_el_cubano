<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoría</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="menu-header">
  <img src="assets/logo.png" class="logo" alt="Logo del restaurante">

  <a id="back-btn" href="index.html" class="back-btn">⬅ Volver</a>
  <div class="lang-selector">
    <button class="lang-btn active" data-lang="es"><img src="https://flagcdn.com/es.svg" alt="ES"> ES</button>
    <button class="lang-btn" data-lang="en"><img src="https://flagcdn.com/gb.svg" alt="EN"> EN</button>
    <button class="lang-btn" data-lang="de"><img src="https://flagcdn.com/de.svg" alt="DE"> DE</button>
  </div>
</header>

<main>
  <h1 id="titulo-categoria"></h1>
  <div id="menu-container"></div>
</main>

<script src="js/app.js"></script>
<script>
  // Sincronizar idioma guardado con los botones
  const savedLang = localStorage.getItem("lang") || "es";
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === savedLang);
    btn.addEventListener("click", () => {
      const params = new URLSearchParams(window.location.search);
      params.set("lang", btn.dataset.lang);
      localStorage.setItem("lang", btn.dataset.lang);
      window.location.search = params.toString();
    });
  });
</script>

</body>
</html>
